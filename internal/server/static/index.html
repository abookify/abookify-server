            if (chapterRange && chapterRange.end > chapterRange.start) {
              scoped = data.filter(t =>
                t.e > chapterRange.start && t.s < chapterRange.end);
              if (scoped.length === 0) scoped = data; // safety fallback
            }
            activeSyncData = scoped;
            // Decide karaoke safety based on the text source. When the reader
            // is displaying a transcript (format/origin identifies it as the
            // Whisper output itself), DOM words equal sync words 1:1 — karaoke
            // is safe even with <p>/<h2> formatting. When it's a linked ebook
            // without a composed alignment, we can't guarantee word-index
            // equivalence, so highlighting is suppressed. Observed with
            // 438 Days: transcript split into chapters was being treated as
            // "rich HTML, alignment missing" and highlighting stayed off.
            const textIsTranscript = isTextPaneShowingTranscript(workId);
            renderSyncedText(scoped, textIsTranscript);
            startKaraoke();
            return true;
          }
        } catch {}
      }

      activeSyncData = null;
      return false;
    }

    // Returns true if the text the reader is currently rendering came from a
    // transcript (Whisper output) rather than an external ebook. Transcript
    // words align 1:1 with sync_data timestamps, so karaoke highlighting is
    // safe regardless of whether the DOM has paragraph markup.
    function isTextPaneShowingTranscript(workId) {
      const work = allWorks.find(w => w.id == workId);
      if (!work || !work.text_files) return false;
      // Any text file tagged as a transcript — the split-by-chapter path
      // still produces transcript-derived chapters, so the per-chapter reader
      // is trustworthy for karaoke.
      return work.text_files.some(tf =>
        tf.format === 'transcript' || tf.origin === 'whisper_transcript');
    }

    // Render text with individually addressable word spans.
    //
    // Two modes:
    //   1. Reader already has HTML content (from #102 rich-text EPUB): walk
    //      the DOM, wrap each word in a text node with a <span data-widx="N">,
    //      preserving all structural markup (headings, paragraphs, emphasis).
    //   2. Reader is empty or plaintext-only (transcript-only works): build
    //      a flat span-per-word layout from the timestamps themselves.
    function renderSyncedText(timestamps, textIsTranscript) {
      const readerId = 'reader-' + currentWorkId;
      const reader = document.getElementById(readerId);
      if (!reader) {
        console.log('Sync: reader element not found:', readerId);
        return;
      }

      reader.style.minHeight = '200px';

      // For transcript-derived text, we render as paragraphs and lazy-wrap
      // sync spans only inside the active paragraph. This keeps the DOM
      // bounded — a 150k-word book produces ~2000 <p> elements, and we only
      // pay the span-wrapping cost for the paragraph currently being read.
      // The content blob has paragraph breaks pre-inserted by the sidecar
      // importer (double-newline at each >0.6s pause).
      if (textIsTranscript) {
        renderParagraphedTranscript(reader, timestamps);
        return;
      }

      // Non-transcript path: ebook HTML or plain text. Existing behavior.
      const hasRichContent = reader.querySelector('p, h1, h2, h3, h4, h5, h6, blockquote, em, strong');
      if (hasRichContent) {
        wrapWordsInPlace(reader);
        karaokeHighlightSafe = false;
        console.log('Sync: rich HTML mode — words wrapped, karaoke=off (ebook, no alignment)');
      } else {
        // Small plaintext — full flat span wrap is fine.
        karaokeHighlightSafe = true;
        reader.innerHTML = timestamps.map((t, i) => {
          const word = t.w || '';
          return `<span class="sync-word" data-widx="${i}">${escapeHtml(word)}</span>`;
        }).join('');
      }
    }

    // Transcript renderer with lazy per-paragraph span wrapping.
    //
    // Splits the reader's plain-text content on double-newlines (inserted by
    // the sidecar importer at pause boundaries). Each paragraph becomes a
    // <p data-widx-start="A" data-widx-end="B"> element containing plain
    // text. When the karaoke loop enters a paragraph, lazyWrapParagraph()
    // walks it once, replaces the text node with <span class="sync-word">
    // elements, and caches that we've done so. Previously-visited
    // paragraphs stay wrapped (cheap to keep; unwrap adds complexity).
    function renderParagraphedTranscript(reader, timestamps) {
      const raw = reader.textContent || '';
      // Split on paragraph markers. Importer inserts "\n\n" at pauses.
      const paraTexts = raw.split(/\n\n+/).filter(p => p.trim().length > 0);
      if (paraTexts.length === 0) {
        karaokeHighlightSafe = false;
        return;
      }

      // Walk each paragraph's words and attribute them to sync timestamps
      // by count. Words in the paragraph text and words in the timestamps
      // list should be 1:1 for transcript content.
      const paras = [];
      let widx = 0;
      for (const pt of paraTexts) {
        const wordsInPara = pt.trim().split(/\s+/).length;
        paras.push({
          text: pt.trim(),
          widxStart: widx,
          widxEnd: widx + wordsInPara,
        });
        widx += wordsInPara;
      }

      // Guard: word-count mismatch against timestamps means our paragraph
      // word counts have drifted. Log and fall back to non-sync rendering.
      if (Math.abs(widx - timestamps.length) > timestamps.length * 0.05) {
        console.warn(`Sync: paragraph word count ${widx} diverges from sync ${timestamps.length}; karaoke disabled for this chapter.`);
        karaokeHighlightSafe = false;
        reader.innerHTML = paraTexts.map(p => `<p>${escapeHtml(p)}</p>`).join('');
        return;
      }

      reader.innerHTML = paras.map(p => (
        `<p class="sync-para" data-widx-start="${p.widxStart}" data-widx-end="${p.widxEnd}">${escapeHtml(p.text)}</p>`
      )).join('');
      karaokeHighlightSafe = true;
      console.log(`Sync: transcript rendered as ${paras.length} paragraphs, ${widx} words total`);
    }

    // Wrap a single paragraph's words into sync-span elements. Idempotent:
    // repeat calls no-op thanks to the `data-wrapped` attribute.
    function lazyWrapParagraph(para, timestamps) {
      if (!para || para.dataset.wrapped) return;
      const wStart = parseInt(para.dataset.widxStart, 10);
      const wEnd = parseInt(para.dataset.widxEnd, 10);
      const text = para.textContent;
      // Tokenize by whitespace, preserving whitespace as-is.
      const parts = text.split(/(\s+)/);
      let widx = wStart;
      let html = '';
      for (const part of parts) {
        if (!part) continue;
        if (/^\s+$/.test(part)) {
          html += part;
        } else {
          html += `<span class="sync-word" data-widx="${widx}">${escapeHtml(part)}</span>`;
          widx++;
        }
      }
      para.innerHTML = html;
      para.dataset.wrapped = '1';
    }

    // Walk the DOM under `root` and wrap each visible word in a <span
    // class="sync-word" data-widx="N"> while preserving surrounding
    // structure. Idempotent — if a text node sits inside an existing
    // sync-word span, we skip it.
    function wrapWordsInPlace(root) {
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
        acceptNode: (n) => {
          // Skip if already inside a sync-word (re-render safety).
          if (n.parentElement && n.parentElement.classList &&
              n.parentElement.classList.contains('sync-word')) {
            return NodeFilter.FILTER_REJECT;
          }
          return n.nodeValue.trim() ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
        },
      });
      // Collect first — can't mutate during walk.
      const nodes = [];
      let node;
      while ((node = walker.nextNode())) nodes.push(node);

      let widx = 0;
      for (const textNode of nodes) {
        const text = textNode.nodeValue;
        // Split into [whitespace, word, whitespace, word, ...] preserving gaps.
        const parts = text.split(/(\s+)/);
        const frag = document.createDocumentFragment();
        for (const part of parts) {
          if (!part) continue;
          if (/^\s+$/.test(part)) {
            frag.appendChild(document.createTextNode(part));
          } else {
            const span = document.createElement('span');
            span.className = 'sync-word';
            span.dataset.widx = String(widx++);
            span.textContent = part;
            frag.appendChild(span);
          }
        }
        textNode.parentNode.replaceChild(frag, textNode);
      }
      console.log(`Sync: wrapped ${widx} words in HTML reader`);
    }

    // Find the .sync-para whose [widxStart, widxEnd) contains the given
    // word index. Returns null if none found or reader isn't transcript-
    // rendered. Linear scan — paragraphs are usually <2000 per chapter.
    function findParagraphForWord(reader, widx) {
      const paras = reader.querySelectorAll('.sync-para');
      for (const p of paras) {
        const s = parseInt(p.dataset.widxStart, 10);
        const e = parseInt(p.dataset.widxEnd, 10);
        if (widx >= s && widx < e) return p;
      }
      return null;
    }

    // Karaoke loop — highlights current word based on audio position
    function startKaraoke() {
      stopKaraoke();
      console.log('Karaoke: starting loop, words:', activeSyncData?.length);

      let lastLogTime = 0;
      let lastActiveIdx = -1;

      function tick() {
        if (!activeSyncData) {
          syncAnimFrame = requestAnimationFrame(tick);
          return;
        }

        const player = document.getElementById('audio-player');
        // Effective time in the book's absolute timeline. For single-file
        // audiobooks this equals player.currentTime. For multi-file books
        // where sync_data was imported once across all files, add the
        // cumulative offset of files played before the current one.
        const time = player.currentTime + currentAudioOffset;

        // Debug log every 2 seconds
        if (Math.floor(time) !== Math.floor(lastLogTime) && Math.floor(time) % 2 === 0) {
          console.log('Karaoke: time=' + time.toFixed(1) + ' paused=' + player.paused);
          lastLogTime = time;
        }

        // Lead defaults to 0 (Whisper timestamps are usually accurate). User
        // can tune per-session via the "Lead (ms)" input above the reader;
        // value is stored in syncLeadSecs and persisted in localStorage.
        const WINDOW_BEHIND = 1, WINDOW_AHEAD = 4;
        const t = time + syncLeadSecs;
        let activeIdx = -1;
        for (let i = 0; i < activeSyncData.length; i++) {
          if (t >= activeSyncData[i].s) {
            activeIdx = i;
          } else {
            break;
          }
        }

        // Only update DOM if the active word changed and highlighting is safe.
        if (activeIdx !== lastActiveIdx && karaokeHighlightSafe) {
          // Clear previous reading-window and past classes
          document.querySelectorAll('.sync-word.read, .sync-word.past')
            .forEach(el => el.classList.remove('read', 'past'));

          if (activeIdx >= 0) {
            // Lazy-wrap the active paragraph's words into sync-spans on
            // demand. This is how we keep DOM cost bounded on giant
            // chapters — paragraphs are plain <p> text until the user's
            // current audio position enters them.
            const reader = document.getElementById('reader-' + currentWorkId);
            if (reader) {
              const activePara = findParagraphForWord(reader, activeIdx);
              if (activePara) {
                lazyWrapParagraph(activePara, activeSyncData);
                // Also wrap +/- 1 neighbor so highlight spills work across
                // paragraph boundaries without a visible pop-in.
                const prev = activePara.previousElementSibling;
                const next = activePara.nextElementSibling;
                if (prev && prev.classList?.contains('sync-para')) lazyWrapParagraph(prev, activeSyncData);
                if (next && next.classList?.contains('sync-para')) lazyWrapParagraph(next, activeSyncData);
              }
            }

            // Soft reading window: a handful of words around the current
            // position are highlighted (brightened), everything earlier fades.
            const windowStart = Math.max(0, activeIdx - WINDOW_BEHIND);
            const windowEnd = Math.min(activeSyncData.length - 1, activeIdx + WINDOW_AHEAD);
            for (let i = 0; i < windowStart; i++) {
              const el = document.querySelector(`.sync-word[data-widx="${i}"]`);
              if (el) el.classList.add('past');
            }
            for (let i = windowStart; i <= windowEnd; i++) {
              const el = document.querySelector(`.sync-word[data-widx="${i}"]`);
              if (el) el.classList.add('read');
            }
            const el = document.querySelector(`.sync-word[data-widx="${activeIdx}"]`);
            if (el) {
              const reader = el.closest('.reader-content');
              if (reader) {
                const elTop = el.offsetTop - reader.offsetTop;
                const readerMid = reader.clientHeight / 2;
                reader.scrollTop = elTop - readerMid;
              }
            }
          }
          lastActiveIdx = activeIdx;
        }

        syncAnimFrame = requestAnimationFrame(tick);
      }

      syncAnimFrame = requestAnimationFrame(tick);
    }

    function stopKaraoke() {
      if (syncAnimFrame) {
        cancelAnimationFrame(syncAnimFrame);
        syncAnimFrame = null;
      }
      // Don't null activeSyncData here — startKaraoke sets it before calling us
    }

    // Chapter regeneration — triggered from ebook chapter list
    async function regenChapter(workId, chapterIdx, bookId, title, btnEl) {
      // Only confirm if overwriting
      const work = allWorks.find(w => w.id === workId);
      const hasExisting = work?.audio_files?.some(f => f.title === title);
      if (hasExisting && !confirm(`Overwrite existing audio for "${title}"?`)) return;

      // Disable button immediately
      if (btnEl) {
        btnEl.disabled = true;
        btnEl.textContent = '⏳';
        btnEl.style.display = 'inline-block';
        btnEl.title = 'Generating...';
      }

      try {
        const res = await fetch(`/api/works/${workId}/regenerate-chapter`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ book_id: bookId, chapter_idx: chapterIdx }),
        });
        if (res.status === 409) {
          // Already running
        } else if (!res.ok) {
          const data = await res.json();
          alert('Error: ' + (data.error || 'unknown'));
          if (btnEl) { btnEl.disabled = false; btnEl.textContent = 'regen'; }
        }
        loadJobs();
      } catch(e) {
        alert('Request failed');
        if (btnEl) { btnEl.disabled = false; btnEl.textContent = 'regen'; }
      }
    }

    // Player controls
    // --- Custom player controls ---

    function togglePlayPause() {
      const p = document.getElementById('audio-player');
      const btn = document.getElementById('play-pause-btn');
      if (p.paused) { p.play(); btn.innerHTML = '&#9646;&#9646;'; }
      else { p.pause(); btn.innerHTML = '&#9654;'; }
    }

    // Update play/pause icon when state changes externally.
    document.getElementById('audio-player').addEventListener('play', () => {
      document.getElementById('play-pause-btn').innerHTML = '&#9646;&#9646;';
    });
    document.getElementById('audio-player').addEventListener('pause', () => {
      document.getElementById('play-pause-btn').innerHTML = '&#9654;';
    });

    // Scrubber: timeupdate → move fill + thumb.
    document.getElementById('audio-player').addEventListener('timeupdate', () => {
      const p = document.getElementById('audio-player');
      if (!p.duration || isNaN(p.duration)) return;
      const pct = (p.currentTime / p.duration) * 100;
      document.getElementById('scrub-fill').style.width = pct + '%';
      document.getElementById('scrub-thumb').style.left = pct + '%';
      document.getElementById('player-cur').textContent = fmtPlayerTime(p.currentTime);

      // TOC progress: per-chapter fill bars + summary "Chapter X of N · Q%".
      // currentAudioOffset is the cumulative duration of files BEFORE the
      // currently-playing one; adding p.currentTime gives book-absolute time.
      // Skip if there's no synced text book to render against.
      if (currentSyncBookId != null && currentWorkId != null) {
        const work = allWorks.find(w => w.id === currentWorkId);
        const totalSec = (work?.audio_files || []).reduce((a, f) => a + (f.duration_secs || 0), 0);
        const bookSec = p.currentTime + (currentAudioOffset || 0);
        // Update every text-chapter list belonging to this work.
        (work?.text_files || []).forEach(tf => {
          updateChapterProgress(tf.id, bookSec, totalSec);
        });
      }
    });
    document.getElementById('audio-player').addEventListener('loadedmetadata', () => {
      const p = document.getElementById('audio-player');
      document.getElementById('player-dur').textContent = fmtPlayerTime(p.duration);
      renderChapterTicks();
      if (currentPlayingId) renderWaveform(currentPlayingId);
    });
    document.getElementById('audio-player').addEventListener('durationchange', () => {
      const p = document.getElementById('audio-player');
      document.getElementById('player-dur').textContent = fmtPlayerTime(p.duration);
      renderChapterTicks();
    });
    // Re-render waveform when window resizes (canvas width changes).
    window.addEventListener('resize', () => {
      if (currentPlayingId) renderWaveform(currentPlayingId);
    });

    // Scrubber: click/drag to seek.
    (function initScrubber() {
      const bar = document.getElementById('player-scrubber');
      let dragging = false;
      function seekTo(e) {
        const rect = bar.getBoundingClientRect();
        const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        const p = document.getElementById('audio-player');
        if (p.duration) p.currentTime = pct * p.duration;
      }
      bar.addEventListener('mousedown', (e) => { dragging = true; seekTo(e); });
      window.addEventListener('mousemove', (e) => { if (dragging) seekTo(e); });
      window.addEventListener('mouseup', () => { dragging = false; });
      // Touch support for mobile testing in desktop browser.
      bar.addEventListener('touchstart', (e) => { seekTo(e.touches[0]); });
      bar.addEventListener('touchmove', (e) => { seekTo(e.touches[0]); });
    })();

    // Volume slider + mute toggle.
    function setVolume(val) {
      const p = document.getElementById('audio-player');
      p.volume = val / 100;
      updateVolIcon();
      localStorage.setItem(PREF_KEYS.volume, String(p.volume));
    }
    function toggleMute() {
      const p = document.getElementById('audio-player');
      p.muted = !p.muted;
      updateVolIcon();
    }
    function updateVolIcon() {
      const p = document.getElementById('audio-player');
      const icon = document.getElementById('vol-icon');
      if (p.muted || p.volume === 0) icon.innerHTML = '&#128263;';
      else if (p.volume < 0.5) icon.innerHTML = '&#128265;';
      else icon.innerHTML = '&#128266;';
    }

    // Render chapter ticks on the scrubber bar when detected chapters exist.
    // Divergence visualization: after loading a chapter, fetch the work's
    // divergence report and dim any paragraphs without audio coverage.
    const divergenceCache = {};
    async function applyDivergence(workId, chapterIdx) {
      const readerId = 'reader-' + workId;
      const reader = document.getElementById(readerId);
      if (!reader) return;
      // Fetch divergence (cached per work).
      if (!divergenceCache[workId]) {
        try {
          const res = await fetch(`/api/works/${workId}/divergence`);
          const data = await res.json();
          if (data.paragraphs) divergenceCache[workId] = data;
        } catch { return; }
      }
      const report = divergenceCache[workId];
      if (!report || !report.paragraphs) return;
      // Find missing paragraphs for this chapter.
      const missing = new Set();
      for (const p of report.paragraphs) {
        if (p.chapter_idx === chapterIdx && p.status === 'missing') {
          missing.add(p.paragraph_idx);
        }
      }
      if (missing.size === 0) return;
      // Apply to <p> elements in the reader (for HTML-rendered chapters).
      const paragraphs = reader.querySelectorAll('p');
      paragraphs.forEach((el, i) => {
        if (missing.has(i)) el.classList.add('para-missing');
      });
    }

    // Waveform show/hide — persisted across reloads. TTS-generated audio
    // reads as a solid bar (near-constant amplitude), so the waveform often
    // just adds visual noise; hide it in that case.
    function applyWaveformVisibility() {
      const hidden = localStorage.getItem('waveformHidden') === '1';
      const bar = document.getElementById('player-scrubber');
      if (bar) bar.classList.toggle('waveform-hidden', hidden);
      const btn = document.getElementById('waveform-toggle');
      if (btn) btn.style.opacity = hidden ? '0.45' : '1';
    }
    function toggleWaveform() {
      const hidden = localStorage.getItem('waveformHidden') === '1';
      localStorage.setItem('waveformHidden', hidden ? '0' : '1');
      applyWaveformVisibility();
    }

    // Waveform rendering: fetch peaks once per book, draw as vertical
    // bars on the scrubber canvas. Runs after loadedmetadata.
    const waveformCache = {};
    async function renderWaveform(bookId) {
      const canvas = document.getElementById('scrub-waveform');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // Skip the network fetch entirely when the user has hidden waveforms.
      if (localStorage.getItem('waveformHidden') === '1') return;
      let peaks = waveformCache[bookId];
      if (!peaks) {
        try {
          const res = await fetch(`/api/books/${bookId}/waveform`);
          const data = await res.json();
          peaks = data.peaks;
          waveformCache[bookId] = peaks;
        } catch { return; }
      }
      if (!peaks || !peaks.length) return;
      // Resize canvas to its displayed width for crisp drawing.
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.floor(rect.width);
      canvas.height = Math.floor(rect.height);
      const w = canvas.width, h = canvas.height;
      const bars = Math.min(peaks.length, Math.floor(w / 2));
      const step = peaks.length / bars;
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-muted') || '#888';
      for (let i = 0; i < bars; i++) {
        const idx = Math.floor(i * step);
        const peak = peaks[idx];
        const barH = Math.max(1, peak * h * 0.85);
        const x = Math.floor(i * w / bars);
        ctx.fillRect(x, (h - barH) / 2, 1, barH);
      }
    }

    function renderChapterTicks() {
      const bar = document.getElementById('player-scrubber');
      const p = document.getElementById('audio-player');
      if (!bar || !p.duration) return;
      // Remove old ticks.
      bar.querySelectorAll('.chapter-tick').forEach(el => el.remove());
      // Detected chapters are stored in absolute-book-time. They live on
      // currentSyncBookId (= first audio book for multi-file works). The
      // scrubber is local to the currently-playing file, so we have to
      // translate each chapter's absolute start into a file-local time and
      // skip the chapters that fall outside this file's window.
      const chapters = currentSyncBookId ? audioChapterCache[currentSyncBookId] : null;
      if (!chapters || chapters.length < 2) return;
      const fileStart = currentAudioOffset;
      const fileEnd = currentAudioOffset + p.duration;
      const work = allWorks.find(w => w.id === currentWorkId);
      chapters.forEach((ch, idx) => {
        const absStart = ch.start_sec || 0;
        if (absStart < fileStart || absStart > fileEnd) return;
        const localStart = absStart - fileStart;
        const pct = (localStart / p.duration) * 100;
        if (pct < 0.5 || pct > 99) return;
        const tick = document.createElement('div');
        tick.className = 'chapter-tick';
        tick.style.left = pct + '%';
        const label = ch.title || `Chapter ${idx + 1}`;
        tick.dataset.tooltip = `Ch ${idx + 1} · ${label} · ${fmtPlayerTime(absStart)}`;
        tick.addEventListener('click', (e) => {
          e.stopPropagation();
          // Use seekToAbsoluteBookTime so clicks work correctly for multi-
          // file books (may cross file boundaries).
          if (work) seekToAbsoluteBookTime(work, absStart, label);
          else if (p && p.duration) p.currentTime = localStart;
        });
        bar.appendChild(tick);
      });
    }

    function fmtPlayerTime(secs) {
      if (!secs || isNaN(secs)) return '0:00';
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = Math.floor(secs % 60);
      if (h > 0) return h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
      return m + ':' + String(s).padStart(2, '0');
    }

    function skipTime(secs) {
      const player = document.getElementById('audio-player');
      if (player.src) player.currentTime = Math.max(0, player.currentTime + secs);
    }

    function skipChapter(dir) {
      const work = allWorks.find(w => w.id === currentWorkId);
      // Single-file book with detected chapters: navigate the chapter list.
      const detected = currentPlayingId ? audioChapterCache[currentPlayingId] : null;
      if (detected && detected.length) {
        const nextIdx = currentAudioIndex + dir;
        if (nextIdx < 0 || nextIdx >= detected.length) return;
        const ch = detected[nextIdx];
        playAudio(currentPlayingId, ch.index, currentWorkId, ch.title, work ? work.title : '', ch.start_sec || 0);
        return;
      }
      // Multi-file book: step through audio files.
      const nextIndex = currentAudioIndex + dir;
      if (nextIndex >= 0 && nextIndex < currentAudioFiles.length) {
        const next = currentAudioFiles[nextIndex];
        playAudio(next.id, nextIndex, currentWorkId, next.title || next.filename, work ? work.title : '');
      }
    }

    // UI preferences persisted to localStorage.
    const PREF_KEYS = { volume: 'abookify.volume', rate: 'abookify.rate' };

    function setSpeed(speed) {
      const r = parseFloat(speed);
      document.getElementById('audio-player').playbackRate = r;
      localStorage.setItem(PREF_KEYS.rate, String(r));
    }

    // Restore saved volume/rate on load and persist future changes.
    (function initPlayerPrefs() {
      const player = document.getElementById('audio-player');
      const volSlider = document.getElementById('vol-slider');
      const v = parseFloat(localStorage.getItem(PREF_KEYS.volume));
      if (!isNaN(v)) {
        player.volume = Math.max(0, Math.min(1, v));
        if (volSlider) volSlider.value = Math.round(player.volume * 100);
      }
      updateVolIcon();
      const r = parseFloat(localStorage.getItem(PREF_KEYS.rate));
      if (!isNaN(r) && r > 0) {
        player.playbackRate = r;
        const sel = document.getElementById('speed-select');
        if (sel) sel.value = String(r);
      }
      player.addEventListener('volumechange', () => {
        localStorage.setItem(PREF_KEYS.volume, String(player.volume));
        if (volSlider) volSlider.value = Math.round(player.volume * 100);
        updateVolIcon();
      });
      player.addEventListener('ratechange', () => {
        localStorage.setItem(PREF_KEYS.rate, String(player.playbackRate));
      });
    })();

    // Sleep timer with "end of chapter" option + smart resume.
    let sleepTimeout = null;
    let sleepAtChapterEnd = false;
    const sleepLabels = ['Off', '5m', '15m', '30m', '60m', 'Ch'];
    const sleepMins   = [0, 5, 15, 30, 60, -1]; // -1 = end of chapter
    let sleepIdx = 0;

    function toggleSleepTimer() {
      sleepIdx = (sleepIdx + 1) % sleepLabels.length;
      const mins = sleepMins[sleepIdx];
      const btn = document.getElementById('sleep-btn');
      clearTimeout(sleepTimeout);
      sleepAtChapterEnd = false;
      if (mins === 0) {
        btn.textContent = 'Sleep';
        btn.style.color = 'var(--text-muted)';
      } else if (mins === -1) {
        // End-of-chapter mode: set a flag; the timeupdate handler checks.
        sleepAtChapterEnd = true;
        btn.textContent = 'Ch\u23F8';
        btn.style.color = '#f0a500';
      } else {
        btn.textContent = mins + 'm';
        btn.style.color = '#f0a500';
        sleepTimeout = setTimeout(() => {
          const p = document.getElementById('audio-player');
          // Fade volume briefly for a gentle stop.
          p.pause();
          btn.textContent = 'Sleep';
          btn.style.color = 'var(--text-muted)';
          sleepIdx = 0;
        }, mins * 60 * 1000);
      }
    }

    // Check end-of-chapter sleep: if we've crossed the current chapter's
    // endSec, pause. Runs inside the timeupdate event on the player.
    document.getElementById('audio-player').addEventListener('timeupdate', function checkSleepChapter() {
      if (!sleepAtChapterEnd) return;
      const p = document.getElementById('audio-player');
      const chapters = currentPlayingId ? audioChapterCache[currentPlayingId] : null;
      if (!chapters || !chapters.length) return;
      const ch = chapters.find(c => c.index === currentAudioIndex);
      if (ch && ch.end_sec > 0 && p.currentTime >= ch.end_sec - 0.5) {
        p.pause();
        sleepAtChapterEnd = false;
        const btn = document.getElementById('sleep-btn');
        btn.textContent = 'Sleep';
        btn.style.color = 'var(--text-muted)';
        sleepIdx = 0;
      }
    });

    // Smart resume: if user paused for >60 seconds, rewind 5 seconds when
    // they resume — helps them re-orient after being away.
    let lastPauseTime = 0;
    document.getElementById('audio-player').addEventListener('pause', () => {
      lastPauseTime = Date.now();
    });
    document.getElementById('audio-player').addEventListener('play', () => {
      if (lastPauseTime > 0) {
        const elapsed = (Date.now() - lastPauseTime) / 1000;
        if (elapsed > 60) {
          const p = document.getElementById('audio-player');
          p.currentTime = Math.max(0, p.currentTime - 5);
        }
      }
    });

    // Bookmarks
    async function addBookmark() {
      if (!currentWorkId || !currentPlayingId) return;
      const player = document.getElementById('audio-player');
      const work = allWorks.find(w => w.id === currentWorkId);
      const file = currentAudioFiles[currentAudioIndex];
      const title = file ? (file.title || file.filename) : '';

      const note = prompt('Add a note (or leave blank):');
      if (note === null) return; // cancelled

      try {
        await fetch(`/api/works/${currentWorkId}/bookmarks`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            book_id: currentPlayingId,
            type: 'bookmark',
            chapter_idx: currentAudioIndex,
            position_secs: player.currentTime,
            text_snippet: `${title} at ${formatTime(player.currentTime)}`,
            note: note || '',
          }),
        });
      } catch {}
    }

    // --- Full-screen reader ---
    //
    // Design note: the reader element stays in its original DOM position and
    // just gets a `.fullscreen` class. Same node = karaoke spans keep their
    // identity, scroll position is preserved (via a snapshot), event
    // listeners don't need rebinding, and the karaoke tick loop keeps
    // ticking uninterrupted. The NowPlaying bar is position:fixed at the
    // bottom already, so it naturally appears over the fullscreen reader.
    let fullscreenWorkId = null;
    let prevScrollTop = 0;

    function openFullscreenReader(workId) {
      const reader = document.getElementById('reader-' + workId);
      if (!reader) return;
      fullscreenWorkId = workId;
      prevScrollTop = reader.scrollTop;
      reader.classList.add('fullscreen');
      document.getElementById('reader-fs-topbar').classList.add('active');
      document.body.style.overflow = 'hidden';

      // Populate topbar state from the inline sync-panel.
      const work = allWorks.find(w => w.id == workId);
      document.getElementById('fs-title').textContent = work?.title || '';
      const inlineSync = document.getElementById('sync-' + workId);
      const fsSync = document.getElementById('fs-sync-toggle');
      fsSync.checked = inlineSync ? inlineSync.checked : true;
      // Hide sync controls when there's no audio for this work.
      document.getElementById('fs-sync-wrap').style.display =
        work?.has_audio ? 'flex' : 'none';
      document.getElementById('fs-sync-lead').value = Math.round(syncLeadSecs * 1000);
      // Seed appearance selects from saved prefs.
      document.getElementById('fs-font-size').value =
        localStorage.getItem('readerFontSize') || '18px';
      document.getElementById('fs-measure').value =
        localStorage.getItem('readerMeasure') || '33rem';
    }

    function closeFullscreenReader() {
      if (fullscreenWorkId === null) return;
      const reader = document.getElementById('reader-' + fullscreenWorkId);
      if (reader) {
        reader.classList.remove('fullscreen');
        reader.scrollTop = prevScrollTop;
      }
      document.getElementById('reader-fs-topbar').classList.remove('active');
      document.body.style.overflow = '';
      fullscreenWorkId = null;
    }

    // Keep old entry-point alive — the NowPlaying bar still has a ⛶ button
    // wired to openFullscreenNP, and external callers may too. Forward it to
    // the current playing work's reader.
    function openFullscreenNP() {
      if (currentWorkId) openFullscreenReader(currentWorkId);
    }
    function closeFullscreenNP() { closeFullscreenReader(); }

    // Reader appearance — font-size + measure (line width). Writes to CSS
    // custom properties on :root so both inline and fullscreen pick them up.
    function setReaderFontSize(v) {
      document.documentElement.style.setProperty('--reader-font-size', v);
      localStorage.setItem('readerFontSize', v);
    }
    function setReaderMeasure(v) {
      document.documentElement.style.setProperty('--reader-measure', v);
      localStorage.setItem('readerMeasure', v);
    }
    // Apply saved prefs on boot.
    (function hydrateReaderPrefs() {
      const fs = localStorage.getItem('readerFontSize');
      const m = localStorage.getItem('readerMeasure');
      if (fs) document.documentElement.style.setProperty('--reader-font-size', fs);
      if (m) document.documentElement.style.setProperty('--reader-measure', m);
    })();

    // Escape to close.
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && fullscreenWorkId !== null) closeFullscreenReader();
    });

    // --- Chapter boundary override: right-click scrubber to mark ---
    document.getElementById('player-scrubber').addEventListener('contextmenu', async (e) => {
      e.preventDefault();
      const p = document.getElementById('audio-player');
      if (!p.duration || !currentPlayingId) return;
      const rect = e.currentTarget.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      const timeSec = pct * p.duration;
      const title = prompt(`Mark chapter at ${fmtPlayerTime(timeSec)}.\nChapter title:`);
      if (!title) return;
      try {
        await fetch(`/api/books/${currentPlayingId}/chapters`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ title, start_sec: timeSec }),
        });
        // Refresh chapter ticks + audio chapter list.
        renderChapterTicks();
        if (audioChapterCache[currentPlayingId]) {
          delete audioChapterCache[currentPlayingId];
        }
        const work = allWorks.find(w => w.id === currentWorkId);
        if (work) {
          const af = work.audio_files?.find(f => f.id === currentPlayingId);
          if (af) loadAudioChapterList(af, work);
        }
      } catch {}
    });

    // --- Text selection → highlight ---
    // When the user selects text in the reader pane and presses a key or
    // clicks a floating button, create a highlight bookmark.
    document.addEventListener('mouseup', (e) => {
      const sel = window.getSelection();
      if (!sel || sel.isCollapsed || !currentWorkId) return;
      const reader = sel.anchorNode?.parentElement?.closest?.('.reader-content');
      if (!reader) return;
      // Check if highlight button already exists.
      if (document.getElementById('highlight-float')) return;
      const range = sel.getRangeAt(0);
      const rect = range.getBoundingClientRect();
      const btn = document.createElement('button');
      btn.id = 'highlight-float';
      btn.textContent = '🖍 Highlight';
      btn.style.cssText = `position:fixed;top:${rect.top - 30}px;left:${rect.left}px;z-index:999;
        background:var(--accent);color:#fff;border:none;border-radius:4px;
        padding:4px 10px;font-size:0.75rem;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.3);`;
      btn.onclick = async () => {
        const snippet = sel.toString().substring(0, 200);
        const note = prompt('Add a note (or leave blank):');
        if (note === null) { btn.remove(); return; }
        try {
          await fetch(`/api/works/${currentWorkId}/bookmarks`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
              book_id: currentPlayingId || 0,
              type: 'highlight',
              chapter_idx: currentAudioIndex,
              text_snippet: snippet,
              note: note || '',
              color: '#f0e68c',
            }),
          });
        } catch {}
        btn.remove();
        sel.removeAllRanges();
      };
      document.body.appendChild(btn);
      // Auto-remove after 5s or next click.
      setTimeout(() => btn.remove(), 5000);
    });
    document.addEventListener('mousedown', () => {
      const btn = document.getElementById('highlight-float');
      if (btn) btn.remove();
    });

    // --- Bookmarks panel ---
    async function toggleBookmarks(workId) {
      if (!workId) return;
      const panel = document.getElementById('bookmarks-panel-' + workId);
      if (!panel) return;
      if (panel.style.display === 'none') {
        panel.style.display = 'block';
        await loadBookmarksList(workId);
      } else {
        panel.style.display = 'none';
      }
    }

    async function loadBookmarksList(workId) {
      const listEl = document.getElementById('bookmarks-list-' + workId);
      if (!listEl) return;
      try {
        const res = await fetch(`/api/works/${workId}/bookmarks`);
        const bookmarks = await res.json();
        if (!bookmarks || bookmarks.length === 0) {
          listEl.innerHTML = '<div style="color:var(--text-muted);font-style:italic;">No bookmarks yet. Click ★ while playing to add one.</div>';
          return;
        }
        listEl.innerHTML = bookmarks.map(b => `
          <div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);">
            <span style="color:${b.color || '#f0a500'};cursor:pointer;" onclick="seekToBookmark(${b.position_secs})" title="Jump to ${formatTime(b.position_secs)}">
              ★ ${escapeHtml(b.text_snippet || formatTime(b.position_secs))}
            </span>
            ${b.note ? `<span style="color:var(--text-muted);font-size:0.75rem;">${escapeHtml(b.note)}</span>` : ''}
            <span style="flex:1;"></span>
            <span style="color:var(--text-muted);font-size:0.7rem;">${formatTime(b.position_secs)}</span>
            <button onclick="deleteBookmark(${b.id}, ${workId})" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.7rem;" title="Delete">✕</button>
          </div>
        `).join('');
      } catch {
        listEl.innerHTML = '<div style="color:var(--text-muted);">Failed to load bookmarks</div>';
      }
    }

    function seekToBookmark(positionSecs) {
      const player = document.getElementById('audio-player');
      if (player) {
        player.currentTime = positionSecs;
        if (player.paused) player.play();
      }
    }

    async function deleteBookmark(bookmarkId, workId) {
      try {
        await fetch(`/api/bookmarks/${bookmarkId}`, { method: 'DELETE' });
        await loadBookmarksList(workId);
      } catch {}
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        render();
      });
    });

    document.getElementById('search').addEventListener('input', render);

    // Ctrl+K (or Cmd+K on Mac) to focus search; Escape to clear + blur.
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        const searchEl = document.getElementById('search');
        searchEl.focus();
        searchEl.select();
      }
      if (e.key === 'Escape') {
        const searchEl = document.getElementById('search');
        if (document.activeElement === searchEl) {
          searchEl.value = '';
          searchEl.blur();
          render();
        }
      }
    });

    loadWorks();
    loadQueue();
    applyWaveformVisibility();

    // Custom tooltip — delegated event listeners on the document for any
    // element with [data-tooltip]. Fires ~110ms after hover (CSS transition
    // delay), much faster than the browser's native title tooltip.
    (function installCustomTooltips() {
      const tt = document.getElementById('custom-tooltip');
      if (!tt) return;
      let currentTarget = null;
      function position(e, target) {
        const rect = target.getBoundingClientRect();
        const ttRect = tt.getBoundingClientRect();
        // Prefer above the element; fall back to below if clipped at top.
        let top = rect.top - ttRect.height - 6;
        if (top < 4) top = rect.bottom + 6;
        let left = rect.left + rect.width / 2 - ttRect.width / 2;
        left = Math.max(4, Math.min(window.innerWidth - ttRect.width - 4, left));
        tt.style.left = left + 'px';
        tt.style.top = top + 'px';
      }
      document.addEventListener('mouseover', (e) => {
        const t = e.target.closest('[data-tooltip]');
        if (!t || t === currentTarget) return;
        currentTarget = t;
        tt.textContent = t.dataset.tooltip;
        // Position once to get dimensions, then reposition after text applies.
        tt.classList.add('visible');
        requestAnimationFrame(() => position(e, t));
      });
      document.addEventListener('mouseout', (e) => {
        const t = e.target.closest('[data-tooltip]');
        if (t && t === currentTarget) {
          currentTarget = null;
          tt.classList.remove('visible');
        }
      });
      // Follow cursor so the tooltip tracks ticks as user slides along the scrubber.
      document.addEventListener('mousemove', (e) => {
        if (currentTarget) position(e, currentTarget);
      });
    })();
    // Clear any terminal-state notifications from previous sessions so a fresh
    // page load feels fresh. Running/queued jobs are preserved server-side.
    fetch('/api/jobs/inactive', { method: 'DELETE' }).finally(loadJobs);

    // Ingest queue status — populates the bar above the jobs bar.
    // Hidden when nothing is queued, processing, or failed.
    async function loadQueue() {
      const bar = document.getElementById('queue-bar');
      if (!bar) return;
      try {
        const res = await fetch('/api/queue/status');
        const s = await res.json();
        const incoming = (s.incoming || []).length;
        const processing = (s.processing || []).length;
        const failed = s.failed || [];
        if (incoming === 0 && processing === 0 && failed.length === 0) {
          bar.classList.remove('visible');
          bar.innerHTML = '';
          return;
        }
        const counts = [];
        if (incoming > 0)   counts.push(`<strong>${incoming}</strong> waiting`);
        if (processing > 0) counts.push(`<strong>${processing}</strong> processing`);
        if (failed.length)  counts.push(`<strong style="color:#ff6b8a;">${failed.length}</strong> failed`);
        const failedList = failed.length ? `
          <div class="queue-failed-list">
            ${failed.map(f => `
              <div class="queue-failed-item">
                <span class="queue-failed-name">${escapeHtml(f.name)}</span>
                <span class="queue-failed-error" data-tooltip="${escapeHtml(f.last_error || '')}">${escapeHtml(f.last_error || 'unknown error')}</span>
                <button class="queue-dismiss" onclick="dismissFailedQueueItem('${escapeJs(f.name)}')">dismiss</button>
              </div>`).join('')}
          </div>` : '';
        bar.innerHTML = `
          <div class="queue-row">
            <span style="font-size:1rem;">📥</span>
            <div class="queue-counts">Ingest queue: ${counts.join(' · ')}</div>
          </div>
          ${failedList}`;
        bar.classList.add('visible');
      } catch {
        // Silent fail — queue is non-critical.
      }
    }

    async function dismissFailedQueueItem(name) {
      try {
        await fetch('/api/queue/failed/' + encodeURIComponent(name), { method: 'DELETE' });
        loadQueue();
      } catch {}
    }

    // Jobs management
    let activeJobs = {};

    async function loadJobs() {
      try {
        const res = await fetch('/api/jobs');
        const jobs = await res.json();
        activeJobs = {};
        for (const j of jobs) activeJobs[j.id] = j;
        renderJobsBar(jobs);
      } catch {}
    }

    function renderJobsBar(jobs) {
      const bar = document.getElementById('jobs-bar');
      const running = jobs.filter(j => j.status === 'running' || j.status === 'queued');
      const recent = jobs.filter(j => j.status !== 'running' && j.status !== 'queued');

      if (running.length === 0 && recent.length === 0) {
        bar.classList.remove('visible');
        return;
      }

      bar.classList.add('visible');
      const allJobs = [...running, ...recent.slice(0, 3)];
      bar.innerHTML = allJobs.map(j => {
        const work = allWorks.find(w => w.id == j.work_id); // loose equality for type safety
        const workTitle = work ? work.title : (j.current_step || 'Unknown');
        const typeLabel = j.type === 'tts' ? 'Generating audio' : 'Transcribing';
        const pct = Math.round(j.progress * 100);
        const isActive = j.status === 'running' || j.status === 'queued';
        const isDone = j.status === 'completed';
        const statusClass = isDone ? 'completed' : j.status === 'failed' || j.status === 'interrupted' ? 'failed' : '';

        // ETA: show on running jobs, clear on completed
        const eta = (j.status === 'running' && j.eta && j.eta !== 'estimating...') ? ` &mdash; ${j.eta}` : '';

        return `<div class="job-item ${statusClass}">
          ${j.status === 'running' ? '<div class="job-spinner"></div>' : ''}
          <div class="job-info">
            <div class="job-title">${typeLabel}: ${escapeHtml(workTitle)}</div>
            <div class="job-step">${
              isDone ? 'Done!' :
              j.status === 'failed' ? 'Failed: ' + (j.error||'') :
              j.status === 'interrupted' ? 'Interrupted: ' + (j.error||'server restarted') :
              j.status === 'queued' ? 'Queued — waiting for current job to finish' :
              (j.current_step || 'Starting...')}${eta}</div>
          </div>
          <div class="job-progress"><div class="job-progress-fill" style="width:${pct}%"></div></div>
          <span style="font-size:0.75rem;color:var(--text-muted);">${pct}%</span>
          ${(j.status === 'interrupted' || j.status === 'failed') ? `<button onclick="retryJob('${j.id}','${j.type}',${j.work_id})" style="background:none;border:1px solid var(--accent);color:var(--accent);cursor:pointer;font-size:0.7rem;padding:2px 8px;border-radius:10px;margin-right:4px;" title="Retry">Retry</button>` : ''}
          ${!isActive ? `<button onclick="dismissJob('${j.id}')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;padding:0 4px;" title="Dismiss">&times;</button>` : ''}
        </div>`;
      }).join('');

      // Add "clear all" if there are dismissable items
      if (recent.length > 1) {
        bar.innerHTML += `<div style="text-align:right;padding:0 4px 4px;">
          <button onclick="dismissAllJobs()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.75rem;text-decoration:underline;">Clear all notifications</button>
        </div>`;
      }
    }

    async function resyncWork(workId) {
      if (!confirm('Re-run Whisper to generate word-level sync timestamps? This can take a while for long audiobooks.')) return;
      const res = await fetch(`/api/works/${workId}/transcribe`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: '{}',
      });
      if (res.ok) { loadJobs(); } else { alert('Failed to start sync job'); }
    }

    function openMergeDialog() {
      const opts = allWorks.map(w => `<option value="${w.id}">${escapeHtml(w.title)}</option>`).join('');
      document.getElementById('merge-target').innerHTML = opts;
      document.getElementById('merge-source').innerHTML = opts;
      document.getElementById('merge-dialog').style.display = 'flex';
    }

    function closeMergeDialog() {
      document.getElementById('merge-dialog').style.display = 'none';
    }

    async function executeMerge() {
      const targetId = document.getElementById('merge-target').value;
      const sourceId = document.getElementById('merge-source').value;
      if (!targetId || !sourceId) { alert('Select both works.'); return; }
      if (targetId === sourceId) { alert('Cannot merge a work into itself.'); return; }
      const source = allWorks.find(w => w.id === parseInt(sourceId));
      if (!confirm(`Move all files from "${source?.title}" into the other work? "${source?.title}" will be deleted.`)) return;
      const res = await fetch(`/api/works/${targetId}/merge`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ source_id: parseInt(sourceId) }),
      });
      closeMergeDialog();
      if (res.ok) { loadWorks(); } else { alert('Merge failed: ' + (await res.json()).error); }
    }

    async function retryJob(id, type, workId) {
      // Dismiss the old record, then kick off a new job of the same type.
      await fetch(`/api/jobs/${id}`, { method: 'DELETE' });
      const endpoint = type === 'tts' ? `/api/works/${workId}/generate-audio` : `/api/works/${workId}/transcribe`;
      await fetch(endpoint, { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' });
      loadJobs();
    }

    async function dismissJob(id) {
      await fetch(`/api/jobs/${id}`, { method: 'DELETE' });
      loadJobs();
    }

    async function dismissAllJobs() {
      await fetch('/api/jobs/inactive', { method: 'DELETE' });
      loadJobs();
    }

    function handleJobUpdate(job) {
      activeJobs[job.id] = job;
      renderJobsBar(Object.values(activeJobs));
      // Update generate buttons
      const prefix = job.type === 'tts' ? 'gen-audio-' : 'gen-text-';
      const btn = document.getElementById(prefix + job.work_id);
      if (btn) {
        if (job.status === 'completed') {
          btn.disabled = false;
          btn.textContent = 'Done!';
          loadWorks();
        } else if (job.status === 'failed') {
          btn.disabled = false;
          btn.textContent = 'Failed - retry?';
        } else {
          btn.disabled = true;
          const pct = Math.round(job.progress * 100);
          btn.innerHTML = `<span class="spinner"></span>${pct}%`;
        }
      }
    }

    // TTS/STT generation
    async function generateAudio(workId) {
      const btn = document.getElementById('gen-audio-' + workId);
      if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Starting...'; }
      try {
        const res = await fetch(`/api/works/${workId}/generate-audio`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' });
        const data = await res.json();
        if (res.status === 409) { if (btn) btn.innerHTML = '<span class="spinner"></span>Already running'; loadJobs(); return; }
        if (!res.ok) { alert('Error: ' + (data.error || 'unknown')); if (btn) { btn.disabled = false; btn.textContent = 'Generate with TTS'; } return; }
        loadJobs(); // Immediately show in jobs bar
      } catch(e) { alert('Request failed'); if (btn) { btn.disabled = false; btn.textContent = 'Generate with TTS'; } }
    }

    async function transcribeAudio(workId) {
      const btn = document.getElementById('gen-text-' + workId);
      if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Starting...'; }
      try {
        const res = await fetch(`/api/works/${workId}/transcribe`, { method: 'POST' });
        const data = await res.json();
        if (res.status === 409) { if (btn) btn.innerHTML = '<span class="spinner"></span>Already running'; loadJobs(); return; }
        if (!res.ok) { alert('Error: ' + (data.error || 'unknown')); if (btn) { btn.disabled = false; btn.textContent = 'Generate transcript'; } return; }
        loadJobs(); // Immediately show in jobs bar
      } catch(e) { alert('Request failed'); if (btn) { btn.disabled = false; btn.textContent = 'Generate transcript'; } }
    }

    // .abook download with spinner
    async function downloadAbook(workId, el) {
      if (el.dataset.downloading) return;
      el.dataset.downloading = 'true';
      const origText = el.textContent;
      el.innerHTML = '<span class="spinner" style="border-color:var(--epub);border-top-color:transparent;width:10px;height:10px;margin-right:4px;"></span>Zipping...';
      el.style.pointerEvents = 'none';
      try {
        const res = await fetch(`/api/works/${workId}/export.abook`);
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `work-${workId}.abook`;
        a.click();
        URL.revokeObjectURL(url);
        el.textContent = 'Done!';
        setTimeout(() => { el.textContent = origText; }, 2000);
      } catch(e) {
        el.textContent = 'Error';
        setTimeout(() => { el.textContent = origText; }, 2000);
      } finally {
        el.style.pointerEvents = '';
        delete el.dataset.downloading;
      }
    }

    // Import .abook
    async function importAbook(input) {
      const file = input.files[0];
      if (!file) return;
      input.value = '';

      const form = new FormData();
      form.append('file', file);

      try {
        const res = await fetch('/api/import', { method: 'POST', body: form });
        const data = await res.json();
        if (res.ok) {
          loadWorks();
        } else {
          alert('Import failed: ' + (data.error || 'unknown'));
        }
      } catch(e) {
        alert('Import failed: ' + e.message);
      }
    }

    // Q&A — tries LLM-powered RAG first, falls back to keyword search
    async function askQuestion(workId) {
      const input = document.getElementById('qa-input-' + workId);
      const resultsEl = document.getElementById('qa-results-' + workId);
      const query = input.value.trim();
      const bookId = input.dataset.bookId;

      if (!query || query.length < 2) return;

      resultsEl.innerHTML = '<div class="qa-empty">Thinking...</div>';

      // Try LLM-powered Q&A first
      try {
        const askRes = await fetch(`/api/works/${workId}/ask`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ question: query }),
        });

        if (askRes.ok) {
          const answer = await askRes.json();
          let html = `<div class="qa-result" style="cursor:default; border-color:rgba(240,165,0,0.3);">
            <div class="qa-passage" style="white-space:pre-wrap; line-height:1.6;">${escapeHtml(answer.text)}</div>
            <div class="qa-cite" style="margin-top:8px;">Powered by ${escapeHtml(answer.model || 'AI')} &middot; ${answer.chunks_used} passages referenced</div>
          </div>`;

          if (answer.citations && answer.citations.length > 0) {
            html += '<div style="font-size:0.75rem;color:var(--text-muted);margin:8px 0 4px;text-transform:uppercase;letter-spacing:0.05em;">Sources</div>';
            html += answer.citations.map(c =>
              `<div class="qa-result" onclick="loadChapter(${bookId}, ${c.chapter_idx}, ${workId})">
                <div class="qa-passage" style="font-size:0.75rem;">${escapeHtml(c.excerpt)}</div>
                <div class="qa-cite">${escapeHtml(c.chapter_title || 'Chapter ' + c.chapter_idx)}</div>
              </div>`
            ).join('');
          }

          resultsEl.innerHTML = html;
          return;
        }
        // If 503 (no LLM configured), fall through to keyword search
      } catch {}

      // Fallback: keyword search
      try {
        const res = await fetch(`/api/books/${bookId}/search?q=${encodeURIComponent(query)}`);
        const chunks = await res.json();

        if (chunks.length === 0) {
          resultsEl.innerHTML = '<div class="qa-empty">No matching passages found. Configure an AI provider in Settings for smarter answers.</div>';
          return;
        }

        let chapterTitles = {};
        if (chapterCache[bookId]?.chapters) {
          for (const ch of chapterCache[bookId].chapters) chapterTitles[ch.index] = ch.title;
        }

        resultsEl.innerHTML = '<div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:6px;">Keyword results (configure AI in Settings for smarter answers)</div>' +
          chunks.map(c => {
            const highlighted = highlightWords(c.content, query);
            const preview = smartTruncate(highlighted, query, 300);
            const chTitle = chapterTitles[c.chapter_idx] || ('Chapter ' + c.chapter_idx);
            return `<div class="qa-result" onclick="loadChapter(${bookId}, ${c.chapter_idx}, ${workId})">
              <div class="qa-passage">${preview}</div>
              <div class="qa-cite">${escapeHtml(chTitle)} &middot; words ${c.start_word}-${c.end_word}</div>
            </div>`;
          }).join('');
      } catch {
        resultsEl.innerHTML = '<div class="qa-empty">Search failed</div>';
      }
    }

    function highlightWords(text, query) {
      const words = query.toLowerCase().split(/\s+/).filter(w => w.length > 2);
      let result = escapeHtml(text);
      for (const word of words) {
        const re = new RegExp(`(${word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        result = result.replace(re, '<mark>$1</mark>');
      }
      return result;
    }

    function smartTruncate(html, query, maxLen) {
      // Find position of first <mark> and center around it
      const markIdx = html.indexOf('<mark>');
      if (markIdx < 0 || html.length <= maxLen) return html;

      const start = Math.max(0, markIdx - 100);
      const end = Math.min(html.length, start + maxLen);
      let snippet = html.substring(start, end);
      if (start > 0) snippet = '...' + snippet;
      if (end < html.length) snippet += '...';
      return snippet;
    }

    // WebSocket for live updates
    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${proto}//${location.host}/api/ws`);

      ws.onmessage = (e) => {
        try {
          const event = JSON.parse(e.data);
          if (event.type === 'library_updated') {
            loadWorks();
            loadQueue();
          } else if (event.type === 'job_update') {
            handleJobUpdate(event.data);
          } else if (event.type === 'queue_updated') {
            loadQueue();
          }
        } catch {}
      };

      ws.onclose = () => {
        setTimeout(connectWS, 3000);
      };

      ws.onerror = () => ws.close();
    }

    connectWS();
    // --- Drag-and-drop upload ---
    (function initDropUpload() {
      const overlay = document.getElementById('drop-overlay');
      let dragCounter = 0; // track nested enter/leave from child elements

      document.addEventListener('dragenter', (e) => {
        e.preventDefault();
        dragCounter++;
        if (e.dataTransfer && e.dataTransfer.types.includes('Files')) {
          overlay.classList.add('active');
        }
      });
      document.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dragCounter--;
        if (dragCounter <= 0) { overlay.classList.remove('active'); dragCounter = 0; }
      });
      document.addEventListener('dragover', (e) => e.preventDefault());
      document.addEventListener('drop', async (e) => {
        e.preventDefault();
        overlay.classList.remove('active');
        dragCounter = 0;
        const files = e.dataTransfer?.files;
        if (!files || files.length === 0) return;

        const box = overlay.querySelector('.drop-box');
        box.innerHTML = `<h2>Uploading ${files.length} file${files.length > 1 ? 's' : ''}...</h2><p>Please wait</p>`;
        overlay.classList.add('active');

        const form = new FormData();
        for (const f of files) form.append('files', f);
        try {
          const res = await fetch('/api/upload', { method: 'POST', body: form });
          const data = await res.json();
          box.innerHTML = `<h2>Uploaded ${data.uploaded || 0} file${data.uploaded !== 1 ? 's' : ''}</h2><p>Library rescanning...</p>`;
          // Wait a moment for the rescan goroutine, then refresh.
          setTimeout(() => { overlay.classList.remove('active'); loadWorks(); }, 2000);
        } catch (err) {
          box.innerHTML = `<h2>Upload failed</h2><p>${err.message}</p>`;
          setTimeout(() => overlay.classList.remove('active'), 3000);
        }
        // Reset box content for next drop.
        setTimeout(() => {
          box.innerHTML = `<h2>Drop files to import</h2>
            <p>Audio: MP3, M4B, M4A, FLAC, AAC &middot; Text: EPUB, MOBI, TXT</p>
            <p style="margin-top:6px; font-size:0.75rem;">PDFs? Convert to EPUB first with <a href="https://calibre-ebook.com/" target="_blank" style="color:var(--accent);">Calibre</a>.</p>`;
        }, 5000);
      });
    })();
  </script>
</body>
