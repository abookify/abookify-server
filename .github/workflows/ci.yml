name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build server
        run: go build -buildvcs=false ./cmd/abookify

      - name: Build CLI tools
        run: |
          CGO_ENABLED=0 go build -buildvcs=false -ldflags="-s -w" -o bin/stt-cli ./cmd/stt-cli
          CGO_ENABLED=0 go build -buildvcs=false -ldflags="-s -w" -o bin/tts-cli ./cmd/tts-cli

      - name: Run tests
        run: go test -buildvcs=false ./internal/... -v -count=1

      - name: Vet
        run: go vet ./...
