services:
  server:
    build: .
    ports:
      - "7654:7654"
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - ./testdata/library:/library
      - generated-audio:/generated
      # Lets the server start/stop the optional BookNLP cast engine on demand
      # (in-UI enable + idle auto-stop) via the compose profile. The server runs
      # as root in-container so it can use the socket; keep /api auth on when the
      # server is exposed — socket access is host-root equivalent.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - ABOOKIFY_LIBRARY_PATH=/library
      - ABOOKIFY_DB_PATH=/app/data/abookify.db
      - ABOOKIFY_PORT=7654
      - ABOOKIFY_TTS_URL=http://kokoro:8880
      - ABOOKIFY_STT_URL=http://whisper:5200
      - ABOOKIFY_BOOKNLP_URL=http://booknlp:5300
      - ABOOKIFY_GENERATED_PATH=/generated
      - NULLBORE_BASE_DOMAIN=abookify.nullbore.com
      - ABOOKIFY_PUBLIC_URL=${ABOOKIFY_PUBLIC_URL:-}
    depends_on:
      kokoro:
        condition: service_started
      whisper:
        condition: service_started

  kokoro:
    build: ./services/kokoro
    ports:
      - "8880:8880"
    volumes:
      - kokoro-models:/app/api/src/models

  whisper:
    build: ./services/whisper
    volumes:
      - whisper-models:/root/.cache
    environment:
      - WHISPER_MODEL=large-v3
      - WHISPER_DEVICE=cpu
      - WHISPER_COMPUTE_TYPE=int8
    ports:
      - "5200:5200"

  # Cast-of-characters extraction (EXPERIMENTAL). Large image (~6.5 GB) and
  # CPU-heavy, so it's opt-in via the `booknlp` profile:
  #   docker compose --profile booknlp up -d booknlp
  # The server reaches it at ABOOKIFY_BOOKNLP_URL; when the service is down,
  # cast extraction simply fails and the UI shows no cast (graceful).
  booknlp:
    build: ./services/booknlp
    environment:
      - BOOKNLP_MODEL=${BOOKNLP_MODEL:-small}
      - PORT=5300
    ports:
      - "5300:5300"
    profiles:
      - booknlp

  # Relay tunnel — exposes the local server through a NullBore relay VPS.
  # Optional: only runs when NULLBORE_API_KEY is set in .env.
  nullbore:
    build: ../relay/client
    restart: unless-stopped
    environment:
      NULLBORE_SERVER: ${NULLBORE_SERVER:-https://tunnel.nullbore.com}
      NULLBORE_API_KEY: ${NULLBORE_API_KEY:-}
      NULLBORE_TUNNELS: ${NULLBORE_TUNNELS:-server:7654}
      NULLBORE_TLS_SKIP_VERIFY: ${NULLBORE_TLS_SKIP_VERIFY:-false}
    # Pin default_ttl=168h (client default is 1h, no env override for it)
    # so the tunnel stops expiring/reconnecting hourly. Read-only; the
    # client's device_id auto-append is a no-op here, same as the
    # (volume-less) prior setup.
    volumes:
      - ../relay/nullbore-config.toml:/root/.config/nullbore/config.toml:ro
    profiles:
      - relay
    depends_on:
      - server

volumes:
  go-mod-cache:
  go-build-cache:
  whisper-models:
  kokoro-models:
  generated-audio:
